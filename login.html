<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClimaTrack - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-section">
                <div class="logo-circle">
                    <span class="logo-text">CT</span>
                </div>
                <h1>ClimaTrack</h1>
                <p class="tagline">Monitorando o clima, cuidando do futuro</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="seu@email.com" 
                        required
                    >
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Digite sua senha" 
                            required
                        >
                        <button 
                            type="button" 
                            class="toggle-password" 
                            id="togglePassword"
                            aria-label="Mostrar/ocultar senha"
                        >
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember" id="remember">
                        <span>Lembrar-me</span>
                    </label>
                    <a href="#" class="forgot-password">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="login-button">Entrar</button>

                <div class="login-message" id="loginMessage"></div>
            </form>

            <div class="signup-section">
                <p>Não tem uma conta? <a href="#" class="signup-link">Cadastre-se aqui</a></p>
            </div>

            <div class="social-login">
                <p class="divider">Ou continue com</p>
                <div class="social-buttons">
                    <button type="button" class="social-btn google-btn" id="googleBtn">
                        <span class="social-icon">🔍</span> Google
                    </button>
                    <button type="button" class="social-btn github-btn" id="githubBtn">
                        <span class="social-icon">⚙️</span> GitHub
                    </button>
                </div>
            </div>
        </div>

        <div class="background-decoration">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
